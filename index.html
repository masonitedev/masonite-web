<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Masonite — coming soon." />
  <title>Masonite</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #0f1115;
      color: #e8eaed;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    main {
      text-align: center;
      max-width: 36rem;
    }

    h1 {
      font-size: clamp(2.5rem, 8vw, 4rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 1rem;
    }

    p {
      font-size: 1.125rem;
      color: #9aa0a6;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    a.button {
      display: inline-block;
      padding: 0.75rem 1.75rem;
      border-radius: 0.5rem;
      background: #e8eaed;
      color: #0f1115;
      text-decoration: none;
      font-weight: 600;
      transition: opacity 0.15s ease;
    }

    a.button:hover {
      opacity: 0.85;
    }

    footer {
      margin-top: 4rem;
      font-size: 0.875rem;
      color: #5f6368;
    }
  </style>
</head>
<body>
  <main>
    <h1>Masonite</h1>
    <p>Something solid is being built here. Stay tuned.</p>
    <a class="button" href="mailto:hello@masonite.dev">Get in touch</a>
    <footer>&copy; 2026 masonite.dev</footer>
  </main>
</body>
</html>
